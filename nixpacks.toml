[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "python manage.py migrate --noinput && python manage.py populate_data && gunicorn aunt_enid_campaign.wsgi:application --bind 0.0.0.0:$PORT --log-file -"
